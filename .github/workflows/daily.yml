name: Daily MCGM Weather Collection

on:
  schedule:
    # Runs every day at 08:40 IST (03:10 UTC)
    - cron: '10 3 * * *'

  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python fetch_mcgm.py

      - name: Commit new data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add daily_data/

          git diff --cached --quiet || git commit -m "Daily MCGM rainfall update"

          git push